<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotex | Trading Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #13161c; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2b2f3a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const chartContainerRef = useRef();
            const chartRef = useRef(null);
            const [balance, setBalance] = useState(24500.75);
            const [showAdmin, setShowAdmin] = useState(false);
            const [accountType, setAccountType] = useState('Live');
            const [forceResult, setForceResult] = useState('random');
            const [trades, setTrades] = useState([
                { id: 1, pair: 'BTC/USDT', type: 'UP', amount: 1000, profit: '+$1850', status: 'won' }
            ]);

            // SECRET KEYBIND (Ctrl + Shift + H)
            useEffect(() => {
                const handleKey = (e) => {
                    if (e.ctrlKey && e.shiftKey && e.key === 'H') setShowAdmin(prev => !prev);
                };
                window.addEventListener('keydown', handleKey);
                if (window.lucide) lucide.createIcons();
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            // BULLETPROOF CHART LOGIC
            useEffect(() => {
                if (!chartContainerRef.current) return;

                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    layout: { background: { color: '#1c1f26' }, textColor: '#d1d4dc' },
                    grid: { vertLines: { color: '#2b2f3a' }, horzLines: { color: '#2b2f3a' } },
                    width: chartContainerRef.current.clientWidth,
                    height: chartContainerRef.current.clientHeight || 500,
                    timeScale: { borderVisible: false },
                });

                // The fix: explicit series creation
                const candleSeries = chart.addCandlestickSeries({
                    upColor: '#00d346', downColor: '#ff5500', borderVisible: false,
                    wickUpColor: '#00d346', wickDownColor: '#ff5500',
                });

                chartRef.current = chart;

                let lastPrice = 68432.10;
                const interval = setInterval(() => {
                    lastPrice += (Math.random() - 0.5) * 10;
                    candleSeries.update({ 
                        time: Math.floor(Date.now() / 1000), 
                        open: lastPrice, high: lastPrice + 5, low: lastPrice - 5, close: lastPrice + 2 
                    });
                }, 1000);

                const handleResize = () => chart.applyOptions({ width: chartContainerRef.current.clientWidth });
                window.addEventListener('resize', handleResize);

                return () => { clearInterval(interval); chart.remove(); window.removeEventListener('resize', handleResize); };
            }, []);

            const executeTrade = (type) => {
                const id = Date.now();
                setTrades(t => [{ id, pair: 'BTC/USDT', type, amount: 1000, profit: '...', status: 'pending' }, ...t]);

                setTimeout(() => {
                    const isWin = forceResult === 'win' || (forceResult === 'random' && Math.random() > 0.4);
                    if (isWin) {
                        setBalance(b => b + 850);
                        setTrades(t => t.map(x => x.id === id ? { ...x, profit: '+$1850', status: 'won' } : x));
                    } else {
                        setBalance(b => b - 1000);
                        setTrades(t => t.map(x => x.id === id ? { ...x, profit: '-$1000', status: 'lost' } : x));
                    }
                }, 2000);
            };

            return (
                <div className="flex flex-col h-screen text-white select-none bg-[#13161c]">
                    {/* HIDDEN ADMIN PANEL */}
                    {showAdmin && (
                        <div className="fixed top-20 left-24 z-[999] bg-slate-900 border-2 border-blue-500 p-6 rounded-2xl shadow-2xl w-72">
                            <h2 className="text-blue-400 font-black mb-4 uppercase text-xs tracking-widest">God Mode Console</h2>
                            <div className="space-y-4">
                                <input type="number" placeholder="Set Balance" className="w-full bg-black p-2 rounded text-sm border border-gray-700" onChange={(e) => setBalance(Number(e.target.value))} />
                                <select className="w-full bg-black p-2 rounded text-sm border border-gray-700" onChange={(e) => setForceResult(e.target.value)}>
                                    <option value="random">Random</option>
                                    <option value="win">Always Win</option>
                                    <option value="loss">Always Loss</option>
                                </select>
                                <button onClick={() => setAccountType(at => at === 'Live' ? 'Demo' : 'Live')} className="w-full bg-blue-600 p-2 rounded text-xs font-black">SWITCH TO {accountType === 'Live' ? 'DEMO' : 'LIVE'}</button>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="h-16 flex items-center justify-between px-8 bg-[#1c1f26] border-b border-gray-800">
                        <span className="text-3xl font-black text-[#00DDFF] italic">QUOTEX</span>
                        <div className="flex items-center gap-6">
                            <div className="bg-[#2b2f3a] px-5 py-2 rounded-lg border border-gray-700 flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-[9px] text-gray-500 font-bold uppercase">{accountType} Account</p>
                                    <p className="text-lg font-black text-[#00d346]">${balance.toLocaleString()}</p>
                                </div>
                                <i data-lucide="chevron-down" className="w-4 h-4 text-gray-400"></i>
                            </div>
                            <button className="bg-blue-600 px-8 py-2.5 rounded-lg font-black text-sm">DEPOSIT</button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        <aside className="w-20 bg-[#1c1f26] border-r border-gray-800 flex flex-col items-center py-8 gap-10 text-gray-400">
                            <i data-lucide="trending-up" className="text-blue-400"></i>
                            <i data-lucide="history"></i>
                            <i data-lucide="wallet"></i>
                        </aside>

                        <main className="flex-1 p-4 relative bg-[#13161c]">
                            <div ref={chartContainerRef} className="w-full h-full rounded-2xl overflow-hidden border border-gray-800" />
                        </main>

                        <aside className="w-80 bg-[#1c1f26] border-l border-gray-800 p-6 flex flex-col gap-6">
                            <div className="bg-[#2b2f3a] p-4 rounded-xl border border-gray-700">
                                <p className="text-[10px] text-gray-500 font-bold uppercase mb-1">Investment</p>
                                <p className="text-2xl font-black">$1,000</p>
                            </div>
                            <button onClick={() => executeTrade('UP')} className="w-full bg-[#00d346] h-28 rounded-2xl flex flex-col items-center justify-center transition-all active:scale-95 shadow-lg shadow-green-900/20">
                                <span className="text-2xl font-black">UP</span>
                                <span className="text-[10px] font-bold opacity-60">Profit: 85%</span>
                            </button>
                            <button onClick={() => executeTrade('DOWN')} className="w-full bg-[#ff5500] h-28 rounded-2xl flex flex-col items-center justify-center transition-all active:scale-95 shadow-lg shadow-red-900/20">
                                <span className="text-2xl font-black">DOWN</span>
                                <span className="text-[10px] font-bold opacity-60">Profit: 85%</span>
                            </button>
                            
                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                <p className="text-[10px] font-bold text-gray-500 uppercase mb-4">Trades</p>
                                {trades.map(t => (
                                    <div key={t.id} className="flex justify-between mb-3 bg-black/20 p-3 rounded-lg border-l-4 border-blue-500">
                                        <span className="text-[10px] font-bold">{t.type}</span>
                                        <span className={`font-black ${t.status === 'won' ? 'text-green-400' : 'text-red-400'}`}>{t.profit}</span>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
