
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quotex | Trading Room</title>
    <!-- ELITE STACK -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --q-bg: #13161c;
            --q-surface: #1c1f26;
            --q-green: #00d346;
            --q-red: #ff5500;
            --q-blue: #00DDFF;
        }

        body { 
            background-color: var(--q-bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .chart-container { height: calc(100vh - 64px); width: 100%; }
        @media (max-width: 768px) { .chart-container { height: calc(100vh - 220px); } }

        .btn-up { background: var(--q-green); transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 211, 70, 0.2); }
        .btn-down { background: var(--q-red); transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.2); }
        .btn-up:active, .btn-down:active { transform: scale(0.95); opacity: 0.8; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2b2f3a; border-radius: 10px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .entry-line { 
            position: absolute; left: 0; right: 0; border-top: 1px dashed var(--q-blue); 
            z-index: 20; pointer-events: none; opacity: 0.7;
        }

        .rolling-num { display: inline-block; transition: transform 0.3s cubic-bezier(0,1,0,1); }
        
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-trade { animation: fade-in-up 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- SUB-COMPONENTS ---
        const AnimatedBalance = ({ value }) => {
            const [display, setDisplay] = useState(value);
            useEffect(() => {
                let start = display;
                const end = value;
                const duration = 600;
                let startTime = null;

                const step = (t) => {
                    if (!startTime) startTime = t;
                    const progress = Math.min((t - startTime) / duration, 1);
                    const current = start + progress * (end - start);
                    setDisplay(current);
                    if (progress < 1) requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            }, [value]);

            return <span>${display.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>;
        };

        const App = () => {
            const chartContainerRef = useRef();
            const seriesRef = useRef();
            const [balance, setBalance] = useState(15420.85);
            const [price, setPrice] = useState(68432.10);
            const [investment, setInvestment] = useState(1000);
            const [trades, setTrades] = useState([]);
            const [adminOpen, setAdminOpen] = useState(false);
            const [forceResult, setForceResult] = useState('random'); // 'win', 'loss', 'random'
            const [isLive, setIsLive] = useState(true);
            const [latency, setLatency] = useState(24);

            // --- ENGINE: CANDLESTICK GENERATION ---
            useEffect(() => {
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    layout: { background: { color: '#13161c' }, textColor: '#848E9C', fontSize: 10 },
                    grid: { vertLines: { color: '#1c2029' }, horzLines: { color: '#1c2029' } },
                    width: chartContainerRef.current.clientWidth,
                    height: chartContainerRef.current.clientHeight,
                    crosshair: { mode: 0 },
                    timeScale: { borderVisible: false, timeVisible: true, secondsVisible: true },
                    rightPriceScale: { borderVisible: false },
                });

                seriesRef.current = chart.addCandlestickSeries({
                    upColor: '#00d346', downColor: '#ff5500', borderVisible: false,
                    wickUpColor: '#00d346', wickDownColor: '#ff5500',
                });

                let lastClose = 68432.10;
                let currentCandle = null;

                const updateMarket = () => {
                    const now = Math.floor(Date.now() / 1000);
                    const isNewCandle = !currentCandle || now % 5 === 0;

                    if (isNewCandle) {
                        currentCandle = { time: now, open: lastClose, high: lastClose, low: lastClose, close: lastClose };
                    }

                    const move = (Math.random() - 0.49) * 12;
                    const newClose = currentCandle.close + move;
                    
                    currentCandle.close = newClose;
                    currentCandle.high = Math.max(currentCandle.high, newClose);
                    currentCandle.low = Math.min(currentCandle.low, newClose);
                    
                    lastClose = newClose;
                    setPrice(newClose);
                    setLatency(Math.floor(20 + Math.random() * 15));
                    seriesRef.current.update(currentCandle);
                };

                const interval = setInterval(updateMarket, 1000);
                const handleResize = () => chart.applyOptions({ width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight });
                window.addEventListener('resize', handleResize);

                return () => { clearInterval(interval); chart.remove(); window.removeEventListener('resize', handleResize); };
            }, []);

            const handleTrade = (type) => {
                const entry = price;
                const id = Date.now();
                const newTrade = { id, type, entry, amount: investment, time: new Date().toLocaleTimeString(), status: 'PENDING' };
                
                setTrades(prev => [newTrade, ...prev]);

                setTimeout(() => {
                    const isWin = forceResult === 'win' || (forceResult === 'random' && Math.random() > 0.48);
                    const payout = investment * 0.88;

                    if (isWin) {
                        setBalance(b => b + payout);
                        setTrades(prev => prev.map(t => t.id === id ? { ...t, status: 'WIN', profit: `+$${(investment + payout).toFixed(2)}` } : t));
                    } else {
                        setBalance(b => b - investment);
                        setTrades(prev => prev.map(t => t.id === id ? { ...t, status: 'LOSS', profit: `-$${investment.toFixed(2)}` } : t));
                    }
                }, 5000);
            };

            return (
                <div className="h-screen flex flex-col bg-[#13161c]">
                    {/* ADMIN PANEL */}
                    {adminOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-[#1c1f26] w-full max-w-xs p-8 rounded-3xl border border-gray-800 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-[#00DDFF] font-black text-xs uppercase tracking-tighter">Z-Mode Control</h3>
                                    <button onClick={() => setAdminOpen(false)} className="text-gray-500">✕</button>
                                </div>
                                <div className="space-y-5">
                                    <div>
                                        <label className="text-[10px] text-gray-500 font-bold uppercase mb-1 block">Set Balance</label>
                                        <input 
                                            type="number" 
                                            className="w-full bg-black border border-gray-800 p-3 rounded-xl outline-none focus:border-[#00DDFF]" 
                                            onChange={(e) => setBalance(Number(e.target.value))} 
                                        />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['win', 'loss', 'random'].map(m => (
                                            <button 
                                                key={m} 
                                                onClick={() => setForceResult(m)} 
                                                className={`py-2 rounded-lg text-[10px] font-bold uppercase ${forceResult === m ? 'bg-[#00DDFF] text-black' : 'bg-gray-800 text-gray-400'}`}
                                            >
                                                {m}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={() => setAdminOpen(false)} className="w-full bg-[#00DDFF] text-black py-3 rounded-xl font-black text-xs uppercase mt-2">Apply Settings</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOP NAVBAR */}
                    <header className="h-16 flex items-center justify-between px-4 md:px-8 bg-[#1c1f26] border-b border-gray-800 z-50">
                        <div className="flex items-center gap-4 md:gap-10">
                            <h1 className="text-xl md:text-2xl font-black italic tracking-tighter text-white">QUOTEX</h1>
                            <div className="hidden md:flex gap-8 text-[11px] font-bold uppercase text-gray-500">
                                <span className="text-white border-b-2 border-[#00DDFF] pb-5">Trading</span>
                                <span className="hover:text-white transition cursor-pointer">Market</span>
                                <span className="hover:text-white transition cursor-pointer">Education</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 md:gap-6">
                            <div className="bg-[#2b2f3a] px-3 md:px-5 py-1.5 md:py-2 rounded-lg border border-gray-700 flex items-center gap-3">
                                <div className="text-right">
                                    <div className="flex items-center justify-end gap-1">
                                        <div className="w-1.5 h-1.5 bg-[#00d346] rounded-full"></div>
                                        <p className="text-[8px] md:text-[9px] text-gray-500 font-bold uppercase">Live</p>
                                    </div>
                                    <p className="text-sm md:text-lg font-bold text-[#00d346] tracking-tight">
                                        <AnimatedBalance value={balance} />
                                    </p>
                                </div>
                                <i data-lucide="chevron-down" className="w-4 h-4 text-gray-500"></i>
                            </div>
                            <button 
                                onDoubleClick={() => setAdminOpen(true)} 
                                className="bg-[#00DDFF] text-black px-4 md:px-8 py-2 md:py-2.5 rounded-lg font-black text-xs md:text-sm uppercase shadow-lg shadow-cyan-900/20"
                            >
                                Deposit
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden relative">
                        {/* DESKTOP SIDEBAR */}
                        <aside className="hidden md:flex w-16 bg-[#1c1f26] border-r border-gray-800 flex-col items-center py-8 gap-10 text-gray-500">
                            <div className="text-[#00DDFF]"><i data-lucide="trending-up" className="w-6 h-6"></i></div>
                            <i data-lucide="history" className="w-6 h-6 hover:text-white transition cursor-pointer"></i>
                            <i data-lucide="wallet" className="w-6 h-6 hover:text-white transition cursor-pointer"></i>
                            <i data-lucide="award" className="w-6 h-6 hover:text-white transition cursor-pointer"></i>
                        </aside>

                        {/* CHART AREA */}
                        <main className="flex-1 relative flex flex-col">
                            <div className="absolute top-4 left-4 md:top-6 md:left-6 z-10 flex flex-col gap-2">
                                <div className="bg-[#1c1f26]/70 backdrop-blur-md p-3 md:p-4 rounded-xl border border-white/5 shadow-2xl">
                                    <div className="flex items-center gap-2 mb-1">
                                        <div className="w-5 h-5 bg-orange-500 rounded-full flex items-center justify-center font-black italic text-[9px]">B</div>
                                        <p className="text-[10px] md:text-xs font-bold text-gray-400">Bitcoin / USDT</p>
                                    </div>
                                    <h2 className="text-xl md:text-3xl font-black tracking-tighter tabular-nums">${price.toLocaleString(undefined, {minimumFractionDigits: 2})}</h2>
                                </div>
                                <div className="bg-black/40 px-3 py-1 rounded-full w-fit flex items-center gap-2 border border-white/5">
                                    <span className="w-1.5 h-1.5 bg-[#00d346] rounded-full animate-pulse"></span>
                                    <span className="text-[8px] font-bold text-gray-400 uppercase tracking-widest">{latency}ms Delay</span>
                                </div>
                            </div>
                            
                            <div ref={chartContainerRef} className="chart-container" />
                        </main>

                        {/* RIGHT CONTROL PANEL (Desktop) / BOTTOM SHEET (Mobile) */}
                        <aside className="fixed bottom-0 left-0 right-0 md:static md:w-80 bg-[#1c1f26] border-t md:border-t-0 md:border-l border-gray-800 p-4 md:p-6 flex flex-col gap-4 md:gap-6 shadow-2xl z-50">
                            
                            {/* MOBILE ONLY: QUICK STATS */}
                            <div className="flex md:hidden justify-between items-center mb-2 px-1">
                                <div className="text-[10px] font-bold text-gray-500 uppercase">Payout: <span className="text-[#00d346]">88%</span></div>
                                <div className="text-[10px] font-bold text-gray-500 uppercase">Asset: <span className="text-[#00DDFF]">BTC/USDT</span></div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-1 gap-3 md:gap-4">
                                <div className="bg-[#2b2f3a] p-3 md:p-4 rounded-xl border border-gray-700">
                                    <label className="text-[8px] md:text-[9px] text-gray-500 font-black uppercase mb-1 block">Amount</label>
                                    <div className="flex justify-between items-center">
                                        <span className="text-sm md:text-xl font-bold">${investment}</span>
                                        <div className="flex gap-1">
                                            <button onClick={() => setInvestment(i => i + 50)} className="bg-gray-700 w-6 h-6 md:w-7 md:h-7 rounded-lg flex items-center justify-center">+</button>
                                            <button onClick={() => setInvestment(i => Math.max(0, i - 50))} className="bg-gray-700 w-6 h-6 md:w-7 md:h-7 rounded-lg flex items-center justify-center">-</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#2b2f3a] p-3 md:p-4 rounded-xl border border-gray-700 flex justify-between items-center">
                                    <div>
                                        <label className="text-[8px] md:text-[9px] text-gray-500 font-black uppercase mb-1 block">Time</label>
                                        <span className="text-sm md:text-xl font-bold italic">00:01:00</span>
                                    </div>
                                    <i data-lucide="clock" className="w-4 h-4 text-gray-500"></i>
                                </div>
                            </div>

                            <div className="flex md:flex-col gap-3">
                                <button onClick={() => executeTrade('UP')} className="btn-up flex-1 h-16 md:h-24 rounded-2xl flex flex-col items-center justify-center group">
                                    <i data-lucide="chevron-up" className="w-6 h-6 md:w-8 md:h-8"></i>
                                    <span className="text-lg md:text-2xl font-black italic">UP</span>
                                </button>
                                <button onClick={() => executeTrade('DOWN')} className="btn-down flex-1 h-16 md:h-24 rounded-2xl flex flex-col items-center justify-center group">
                                    <i data-lucide="chevron-down" className="w-6 h-6 md:w-8 md:h-8"></i>
                                    <span className="text-lg md:text-2xl font-black italic">DOWN</span>
                                </button>
                            </div>

                            {/* TRADE HISTORY SECTION */}
                            <div className="hidden md:flex flex-col flex-1 overflow-hidden">
                                <h4 className="text-[10px] font-black text-gray-600 uppercase mb-4 tracking-widest">Live Orders</h4>
                                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-3">
                                    {trades.map(t => (
                                        <div key={t.id} className={`p-4 rounded-2xl bg-[#13161c] border-l-4 animate-trade ${t.status === 'WIN' ? 'border-[#00d346]' : t.status === 'LOSS' ? 'border-[#ff5500]' : 'border-gray-600 opacity-60'}`}>
                                            <div className="flex justify-between items-center">
                                                <div className="text-[10px] font-bold uppercase">
                                                    <p>{t.type} <span className="text-gray-600 ml-2">BTC/USDT</span></p>
                                                    <p className="text-[8px] text-gray-600 mt-0.5">{t.time}</p>
                                                </div>
                                                <p className={`font-black text-sm ${t.status === 'WIN' ? 'text-[#00d346]' : t.status === 'LOSS' ? 'text-[#ff5500]' : ''}`}>
                                                    {t.profit || 'WAITING'}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </aside>
                    </div>
                </aside>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
