<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quotex | Market Leader</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap');
        body { background-color: #13161c; color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .chart-grid { background-image: radial-gradient(#2b2f3a 1px, transparent 1px); background-size: 30px 30px; }
        .active-trade-line { border-top: 2px dashed #00DDFF; position: absolute; left: 0; right: 0; z-index: 20; pointer-events: none; }
        .payout-badge { background: linear-gradient(90deg, #00d346, #00b03b); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .market-up { color: #00d346; } .market-down { color: #ff5500; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .live-indicator { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const chartRef = useRef();
            const seriesRef = useRef();
            const lineRef = useRef();
            const [balance, setBalance] = useState(15420.85);
            const [price, setPrice] = useState(68432.10);
            const [adminOpen, setAdminOpen] = useState(false);
            const [forceResult, setForceResult] = useState('random');
            const [trades, setTrades] = useState([]);
            const [activeTrade, setActiveTrade] = useState(null);
            const [investment, setInvestment] = useState(1000);

            // MARKET ENGINE: High-Frequency Update (100ms)
            useEffect(() => {
                const chart = LightweightCharts.createChart(chartRef.current, {
                    layout: { background: { color: '#13161c' }, textColor: '#848E9C' },
                    grid: { vertLines: { visible: false }, horzLines: { color: '#1c2029' } },
                    crosshair: { mode: 0 },
                    width: chartRef.current.clientWidth,
                    height: window.innerHeight - 80,
                    timeScale: { borderVisible: false, timeVisible: true, secondsVisible: true },
                });

                seriesRef.current = chart.addAreaSeries({
                    lineColor: '#00DDFF', topColor: 'rgba(0, 221, 255, 0.2)', bottomColor: 'rgba(0, 221, 255, 0)',
                    lineWidth: 3, priceLineVisible: false,
                });

                let currentPrice = 68432.10;
                let volatility = 2;

                const tick = () => {
                    const bias = (Math.random() - 0.49) * volatility;
                    currentPrice += bias;
                    setPrice(currentPrice);
                    seriesRef.current.update({ time: Math.floor(Date.now() / 1000), value: currentPrice });
                };

                const interval = setInterval(tick, 150);
                return () => { clearInterval(interval); chart.remove(); };
            }, []);

            const handleTrade = (type) => {
                if (activeTrade) return;
                const entryPrice = price;
                const id = Date.now();
                const newTrade = { id, type, entry: entryPrice, amount: investment, time: new Date().toLocaleTimeString(), status: 'PENDING' };
                
                setActiveTrade(newTrade);
                setTrades(prev => [newTrade, ...prev]);

                // Resolution Logic
                setTimeout(() => {
                    const isWin = forceResult === 'win' || (forceResult === 'random' && Math.random() > 0.45);
                    const profitAmount = investment * 0.88;

                    if (isWin) {
                        setBalance(b => b + profitAmount);
                        setTrades(prev => prev.map(t => t.id === id ? { ...t, status: 'WIN', profit: `+$${(investment + profitAmount).toFixed(2)}` } : t));
                    } else {
                        setBalance(b => b - investment);
                        setTrades(prev => prev.map(t => t.id === id ? { ...t, status: 'LOSS', profit: `-$${investment.toFixed(2)}` } : t));
                    }
                    setActiveTrade(null);
                }, 7000); // 7 second adrenaline window
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* STEALTH ADMIN: Double click Deposit button to trigger */}
                    {adminOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-[#1c1f26] p-8 rounded-3xl border border-cyan-500 w-80 shadow-[0_0_100px_rgba(0,221,255,0.2)]">
                                <h3 className="text-cyan-400 font-black mb-6 flex justify-between uppercase">Ghost Control <span className="cursor-pointer" onClick={()=>setAdminOpen(false)}>×</span></h3>
                                <div className="space-y-4">
                                    <input type="number" placeholder="Set Balance" className="w-full bg-black p-3 rounded-xl outline-none" onChange={(e)=>setBalance(Number(e.target.value))} />
                                    <div className="grid grid-cols-3 gap-2">
                                        {['win', 'loss', 'random'].map(m => (
                                            <button key={m} onClick={()=>setForceResult(m)} className={`py-2 rounded text-[10px] font-bold uppercase ${forceResult === m ? 'bg-cyan-600' : 'bg-gray-800'}`}>{m}</button>
                                        ))}
                                    </div>
                                    <button onClick={()=>setAdminOpen(false)} className="w-full bg-cyan-600 py-3 rounded-xl font-bold uppercase text-xs mt-4">Close Menu</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="h-16 flex items-center justify-between px-8 bg-[#1c1f26] border-b border-gray-800">
                        <div className="flex items-center gap-12">
                            <h1 className="text-2xl font-black italic tracking-tighter text-white">QUOTEX</h1>
                            <div className="flex gap-8 text-[11px] font-bold uppercase text-gray-500 tracking-tighter">
                                <span className="text-white border-b-2 border-cyan-500 pb-5">Trading</span>
                                <span className="hover:text-white transition cursor-pointer">Market</span>
                                <span className="hover:text-white transition cursor-pointer">Education</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-6">
                            <div className="bg-[#2b2f3a] px-5 py-2 rounded-xl flex items-center gap-4 border border-gray-700 hover:border-gray-500 transition cursor-pointer">
                                <div className="text-right">
                                    <p className="text-[9px] text-gray-500 font-bold tracking-widest">LIVE ACCOUNT</p>
                                    <p className="text-lg font-black text-[#00d346] tracking-tight">${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                </div>
                                <i data-lucide="chevron-down" className="w-4 h-4 text-gray-500"></i>
                            </div>
                            <button onDoubleClick={()=>setAdminOpen(true)} className="bg-cyan-600 hover:bg-cyan-500 px-8 py-2.5 rounded-xl font-black text-sm transition shadow-lg shadow-cyan-900/20 uppercase">Deposit</button>
                        </div>
                    </header>

                    <div className="flex flex-1 relative">
                        {/* LEFT NAV */}
                        <aside className="w-20 bg-[#1c1f26] border-r border-gray-800 flex flex-col items-center py-10 gap-10 text-gray-500">
                            <div className="text-cyan-400 p-2 bg-cyan-400/10 rounded-xl"><i data-lucide="line-chart"></i></div>
                            <i data-lucide="history" className="hover:text-white cursor-pointer"></i>
                            <i data-lucide="wallet" className="hover:text-white cursor-pointer"></i>
                            <i data-lucide="user" className="hover:text-white cursor-pointer mt-auto"></i>
                        </aside>

                        {/* MAIN CHART AREA */}
                        <main className="flex-1 bg-[#13161c] relative chart-grid">
                            {/* ACTIVE TRADE INDICATOR */}
                            {activeTrade && (
                                <div className="active-trade-line" style={{ top: '50%' }}>
                                    <div className="bg-cyan-500 text-black text-[10px] font-black px-2 py-1 rounded-r-md absolute -top-3 left-0 shadow-lg">
                                        ENTRY: ${activeTrade.entry.toFixed(2)}
                                    </div>
                                </div>
                            )}

                            <div className="absolute top-8 left-8 z-10 bg-[#1c1f26]/80 backdrop-blur-lg p-5 rounded-2xl border border-white/5 shadow-2xl">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center font-black italic">B</div>
                                    <p className="font-bold text-gray-400">Bitcoin / USDT</p>
                                </div>
                                <h2 className="text-4xl font-black tracking-tighter">${price.toLocaleString(undefined, {minimumFractionDigits: 2})}</h2>
                                <p className="text-[10px] font-bold text-[#00d346] mt-1 live-indicator flex items-center gap-1">
                                    <span className="w-1.5 h-1.5 bg-[#00d346] rounded-full"></span> LIVE MARKET UPDATED
                                </p>
                            </div>
                            <div ref={chartRef} className="w-full h-full" />
                        </main>

                        {/* RIGHT CONTROL PANEL */}
                        <aside className="w-80 bg-[#1c1f26] border-l border-gray-800 p-6 flex flex-col gap-6 shadow-2xl z-20">
                            <div className="space-y-4">
                                <div className="bg-[#2b2f3a] p-4 rounded-2xl border border-gray-700">
                                    <label className="text-[10px] text-gray-500 font-black uppercase mb-2 block">Time</label>
                                    <div className="flex justify-between items-center">
                                        <span className="text-2xl font-black italic">00:30</span>
                                        <div className="flex gap-1">
                                            <button className="bg-gray-700 p-1.5 rounded-lg text-xs">+</button>
                                            <button className="bg-gray-700 p-1.5 rounded-lg text-xs">-</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#2b2f3a] p-4 rounded-2xl border border-gray-700">
                                    <label className="text-[10px] text-gray-500 font-black uppercase mb-2 block">Investment</label>
                                    <div className="flex justify-between items-center text-2xl font-black mb-3">
                                        <span>$</span>
                                        <input type="number" value={investment} onChange={(e)=>setInvestment(Number(e.target.value))} className="bg-transparent text-right outline-none w-32" />
                                    </div>
                                    <div className="flex justify-between gap-1">
                                        {[10, 50, 100, 500].map(v => (
                                            <button key={v} onClick={()=>setInvestment(v)} className="bg-gray-700 flex-1 py-1 rounded text-[10px] font-bold hover:bg-gray-600">+{v}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col gap-3 mt-4">
                                <button onClick={()=>handleTrade('UP')} className="h-32 bg-[#00d346] hover:brightness-110 active:scale-95 transition-all rounded-3xl flex flex-col items-center justify-center shadow-xl shadow-green-900/20 group relative overflow-hidden">
                                    <i data-lucide="trending-up" className="w-12 h-12 mb-1 group-hover:translate-y-[-5px] transition-transform"></i>
                                    <span className="text-3xl font-black italic uppercase tracking-tighter">Higher</span>
                                    <span className="text-[10px] font-black text-green-900 opacity-80">Payout: +88%</span>
                                </button>
                                <button onClick={()=>handleTrade('DOWN')} className="h-32 bg-[#ff5500] hover:brightness-110 active:scale-95 transition-all rounded-3xl flex flex-col items-center justify-center shadow-xl shadow-red-900/20 group relative overflow-hidden">
                                    <i data-lucide="trending-down" className="w-12 h-12 mb-1 group-hover:translate-y-[5px] transition-transform"></i>
                                    <span className="text-3xl font-black italic uppercase tracking-tighter">Lower</span>
                                    <span className="text-[10px] font-black text-red-900 opacity-80">Payout: +88%</span>
                                </button>
                            </div>

                            <div className="mt-6 flex-1 overflow-y-auto custom-scrollbar">
                                <h4 className="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Trades Today</h4>
                                <div className="space-y-3">
                                    {trades.map(t => (
                                        <div key={t.id} className={`p-4 rounded-2xl bg-[#13161c] border-l-4 transition-all duration-500 ${t.status === 'WIN' ? 'border-[#00d346] shadow-[0_0_15px_rgba(0,211,70,0.15)]' : t.status === 'LOSS' ? 'border-[#ff5500] shadow-[0_0_15px_rgba(255,85,0,0.15)]' : 'border-cyan-500'}`}>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <p className="text-[11px] font-black">BTC/USDT • {t.type}</p>
                                                    <p className="text-[9px] text-gray-600 font-bold">{t.time}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`font-black text-sm ${t.status === 'WIN' ? 'text-[#00d346]' : t.status === 'LOSS' ? 'text-[#ff5500]' : 'text-gray-500'}`}>{t.profit || '...'}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </aside>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
